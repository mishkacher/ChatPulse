name: Chrome Extension CI

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  final-integration:
    name: Финальная удалённая интеграция
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Получение исходников
        uses: actions/checkout@v4

      - name: Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Минимальный CI gate
        run: npm run audit:ci

      - name: Проверка checksum
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum -c ChatPulse-Chrome-v0.5.3-beta.zip.sha256

      - name: Проверка отсутствия секретов
        shell: bash
        run: |
          set -euo pipefail
          ! grep -RIE "API[_-]?KEY|CLIENT[_-]?SECRET|BEGIN (RSA|OPENSSH) PRIVATE KEY" chrome-extension tests scripts

      - name: Публикация проверенного beta-артефакта
        uses: actions/upload-artifact@v4
        with:
          name: ChatPulse-Chrome-v0.5.3-beta
          path: |
            dist/ChatPulse-Chrome-v0.5.3-beta.zip
            dist/ChatPulse-Chrome-v0.5.3-beta.zip.sha256
          if-no-files-found: error
          retention-days: 30
