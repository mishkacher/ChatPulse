name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Полный цикл ${{ matrix.round }}/5
    runs-on: macos-15
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        round: [1, 2, 3, 4, 5]

    steps:
      - name: Получение исходников
        uses: actions/checkout@v4

      - name: Версия Swift
        run: swift --version

      - name: Метаданные версии
        shell: bash
        run: |
          set -euo pipefail
          APP_VERSION="$(tr -d '[:space:]' < VERSION)"
          BUILD_NUMBER="$(tr -d '[:space:]' < BUILD_NUMBER)"
          [[ "$APP_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$BUILD_NUMBER" =~ ^[1-9][0-9]*$ ]]
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"

      - name: Модульные тесты debug — цикл ${{ matrix.round }}
        shell: bash
        run: |
          set -o pipefail
          swift test 2>&1 | tee swift-test-debug.log

      - name: Модульные тесты release — цикл ${{ matrix.round }}
        shell: bash
        run: |
          set -o pipefail
          swift test -c release 2>&1 | tee swift-test-release.log

      - name: Диагностические логи Swift — цикл ${{ matrix.round }}
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ChatPulse-swift-logs-${{ matrix.round }}
          path: swift-test-*.log
          if-no-files-found: warn
          retention-days: 7

      - name: Синтаксис shell-скриптов — цикл ${{ matrix.round }}
        shell: bash
        run: |
          set -euo pipefail
          for script in scripts/*.sh; do
            bash -n "$script"
          done

      - name: 20 проверок качества — цикл ${{ matrix.round }}
        run: python3 scripts/quality_gate.py

      - name: Сборка универсального приложения macOS — цикл ${{ matrix.round }}
        run: bash scripts/build_app.sh

      - name: Проверка bundle — цикл ${{ matrix.round }}
        shell: bash
        run: |
          set -euo pipefail
          APP="dist/ChatPulse.app"
          EXECUTABLE="$APP/Contents/MacOS/ChatPulse"
          PLIST="$APP/Contents/Info.plist"
          test -x "$EXECUTABLE"
          test -f "$APP/Contents/Resources/ChatPulse.icns"
          plutil -lint "$PLIST"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$PLIST")" = "$APP_VERSION"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$PLIST")" = "$BUILD_NUMBER"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$PLIST")" = "com.mishkacher.ChatPulse"
          test "$(/usr/libexec/PlistBuddy -c 'Print :LSUIElement' "$PLIST")" = "true"
          ARCHS="$(lipo -archs "$EXECUTABLE")"
          grep -qw arm64 <<< "$ARCHS"
          grep -qw x86_64 <<< "$ARCHS"
          codesign --verify --deep --strict "$APP"
          codesign -dvv "$APP" 2>&1 | grep -q 'Identifier=com.mishkacher.ChatPulse'
          codesign -dvv "$APP" 2>&1 | grep -q 'runtime'

      - name: Упаковка приложения
        if: matrix.round == 5
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE="dist/ChatPulse-macOS-v${APP_VERSION}.zip"
          ditto -c -k --sequesterRsrc --keepParent dist/ChatPulse.app "$ARCHIVE"
          (cd dist && shasum -a 256 "$(basename "$ARCHIVE")" > "$(basename "$ARCHIVE").sha256")
          shasum -a 256 -c "dist/$(basename "$ARCHIVE").sha256"

      - name: Публикация проверенного приложения
        if: matrix.round == 5
        uses: actions/upload-artifact@v4
        with:
          name: ChatPulse-macOS-v${{ env.APP_VERSION }}
          path: |
            dist/ChatPulse-macOS-v${{ env.APP_VERSION }}.zip
            dist/ChatPulse-macOS-v${{ env.APP_VERSION }}.zip.sha256
          if-no-files-found: error
          retention-days: 90
