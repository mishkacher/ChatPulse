<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Обзор интерфейса ChatPulse</title>
  <desc id="desc">Нативное приложение строки меню macOS и встроенный браузер WebKit.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071126"/>
      <stop offset="0.55" stop-color="#11183a"/>
      <stop offset="1" stop-color="#24123d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2c8cff"/>
      <stop offset="1" stop-color="#9b5cff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1200" height="680" rx="28" fill="url(#bg)"/>
  <circle cx="1040" cy="120" r="220" fill="#743cff" opacity="0.10"/>
  <circle cx="210" cy="600" r="260" fill="#008cff" opacity="0.09"/>

  <g transform="translate(62 60)">
    <rect width="70" height="70" rx="18" fill="#111a36" stroke="#7795d8" stroke-width="2"/>
    <path d="M14 40h14l7-25 10 43 7-25h12" fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="92" y="34" fill="#fff" font-size="34" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">ChatPulse</text>
    <text x="92" y="62" fill="#aab4d2" font-size="17" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Меню macOS · встроенный WebKit · без Chrome</text>
  </g>

  <g filter="url(#shadow)" transform="translate(65 172)">
    <rect width="342" height="432" rx="22" fill="#171a28" stroke="#4e5874"/>
    <rect x="0" y="0" width="342" height="48" rx="22" fill="#222638"/>
    <rect x="0" y="30" width="342" height="18" fill="#222638"/>
    <circle cx="26" cy="24" r="5" fill="#ff5f57"/>
    <circle cx="44" cy="24" r="5" fill="#febc2e"/>
    <circle cx="62" cy="24" r="5" fill="#28c840"/>
    <text x="88" y="30" fill="#fff" font-size="15" font-weight="600" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">ChatPulse</text>

    <text x="24" y="82" fill="#b9c3df" font-size="14" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Статус: работает</text>
    <text x="24" y="105" fill="#7f8bab" font-size="12" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Следующая проверка через 5 минут</text>
    <rect x="20" y="126" width="302" height="48" rx="12" fill="url(#accent)"/>
    <text x="171" y="157" text-anchor="middle" fill="#fff" font-size="16" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Остановить</text>

    <line x1="20" y1="194" x2="322" y2="194" stroke="#343a50"/>
    <text x="24" y="224" fill="#fff" font-size="15" font-weight="600" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Интервал проверки</text>
    <rect x="20" y="238" width="302" height="38" rx="9" fill="#222638" stroke="#3b435e"/>
    <text x="36" y="263" fill="#dce3f8" font-size="14" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">5 минут</text>

    <text x="24" y="312" fill="#fff" font-size="15" font-weight="600" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Отслеживаемые чаты</text>
    <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13">
      <circle cx="34" cy="342" r="7" fill="#31c48d"/><text x="52" y="347" fill="#dce3f8">Разработка бота</text>
      <circle cx="34" cy="374" r="7" fill="#31c48d"/><text x="52" y="379" fill="#dce3f8">Анализ кода</text>
      <circle cx="34" cy="406" r="7" fill="#31c48d"/><text x="52" y="411" fill="#dce3f8">Новый проект</text>
    </g>
  </g>

  <g filter="url(#shadow)" transform="translate(445 172)">
    <rect width="690" height="432" rx="22" fill="#f4f5f7"/>
    <rect width="690" height="52" rx="22" fill="#e8e9ec"/>
    <rect y="32" width="690" height="20" fill="#e8e9ec"/>
    <circle cx="24" cy="25" r="6" fill="#ff5f57"/>
    <circle cx="44" cy="25" r="6" fill="#febc2e"/>
    <circle cx="64" cy="25" r="6" fill="#28c840"/>
    <rect x="104" y="12" width="430" height="28" rx="9" fill="#fff" stroke="#cfd3da"/>
    <text x="319" y="31" text-anchor="middle" fill="#666d78" font-size="12" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">https://chatgpt.com/c/...</text>
    <rect x="548" y="11" width="126" height="30" rx="9" fill="url(#accent)"/>
    <text x="611" y="31" text-anchor="middle" fill="#fff" font-size="12" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Добавить чат</text>

    <rect x="0" y="52" width="165" height="380" fill="#202123"/>
    <text x="22" y="88" fill="#fff" font-size="15" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">ChatGPT</text>
    <rect x="14" y="108" width="137" height="34" rx="8" fill="#343541"/>
    <text x="27" y="130" fill="#e5e7eb" font-size="11" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Новый чат</text>
    <text x="22" y="176" fill="#9da3ae" font-size="10" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Последние чаты</text>
    <text x="22" y="202" fill="#d9dce3" font-size="11" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Разработка ChatPulse</text>
    <text x="22" y="228" fill="#d9dce3" font-size="11" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Модуль стратегии</text>

    <text x="205" y="103" fill="#20242b" font-size="22" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Встроенный браузер ChatPulse</text>
    <rect x="205" y="132" width="455" height="86" rx="14" fill="#fff" stroke="#dde0e5"/>
    <text x="224" y="160" fill="#555d68" font-size="12" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">ChatGPT завершил ответ.</text>
    <text x="224" y="184" fill="#20242b" font-size="13" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">ChatPulse запомнит его и подождёт следующую проверку.</text>

    <rect x="205" y="242" width="455" height="86" rx="14" fill="#eef4ff" stroke="#cbdcff"/>
    <text x="224" y="270" fill="#2a5eb6" font-size="12" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Без повторов</text>
    <text x="224" y="296" fill="#283240" font-size="13" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Один ответ получает команду продолжения только один раз.</text>

    <rect x="205" y="354" width="455" height="48" rx="14" fill="#fff" stroke="#d7dae0"/>
    <text x="226" y="384" fill="#8a9099" font-size="12" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">продолжай и не останавливайся до технического лимита</text>
  </g>
</svg>
