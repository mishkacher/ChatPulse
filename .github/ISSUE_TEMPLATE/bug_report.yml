name: Сообщение об ошибке
description: Сообщить о воспроизводимой проблеме Chrome-расширения ChatPulse
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Не прикладывайте cookies, приватные URL чатов, email, коды входа или содержимое переписки.

  - type: input
    id: version
    attributes:
      label: Версия ChatPulse
      placeholder: 0.5.0 beta
    validations:
      required: true

  - type: input
    id: chrome
    attributes:
      label: Версия Chrome и операционная система
      placeholder: Chrome 140, macOS 26
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Что произошло
      description: Опишите фактическое поведение без приватных данных.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
      placeholder: |
        1. Открыть chrome://extensions...
        2. Добавить тестовый чат...
        3. Нажать...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Безопасный фрагмент журнала ChatPulse
      description: Удалите названия чатов, URL и данные аккаунта.
      render: text

  - type: checkboxes
    id: checks
    attributes:
      label: Проверки
      options:
        - label: Я использую актуальную версию из main или последнего beta-артефакта.
          required: true
        - label: Я удалил приватные URL, cookies и содержимое переписки.
          required: true
