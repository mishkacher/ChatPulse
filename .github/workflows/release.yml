name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: chatpulse-release
  cancel-in-progress: false

jobs:
  publish:
    name: Публикация GitHub Release
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Получение проверенного commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Метаданные релиза
        id: metadata
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' < VERSION)"
          BUILD_NUMBER="$(tr -d '[:space:]' < BUILD_NUMBER)"
          TAG="v$VERSION"
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$BUILD_NUMBER" =~ ^[1-9][0-9]*$ ]]
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Релиз $TAG уже существует — повторная публикация не требуется."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Полный релизный preflight
        if: steps.metadata.outputs.skip != 'true'
        run: bash scripts/release_preflight.sh

      - name: Упаковка и checksum
        if: steps.metadata.outputs.skip != 'true'
        shell: bash
        env:
          VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          set -euo pipefail
          ARCHIVE="ChatPulse-macOS-v${VERSION}.zip"
          ditto -c -k --sequesterRsrc --keepParent dist/ChatPulse.app "dist/$ARCHIVE"
          (
            cd dist
            shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
            shasum -a 256 -c "$ARCHIVE.sha256"
          )

      - name: Публикация GitHub Release
        if: steps.metadata.outputs.skip != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.metadata.outputs.tag }}
          VERSION: ${{ steps.metadata.outputs.version }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          ARCHIVE="dist/ChatPulse-macOS-v${VERSION}.zip"
          CHECKSUM="$ARCHIVE.sha256"

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --verify-tag \
              --title "ChatPulse $VERSION" \
              --notes-file RELEASE_NOTES.md \
              --latest \
              "$ARCHIVE" \
              "$CHECKSUM"
          else
            gh release create "$TAG" \
              --target "$HEAD_SHA" \
              --title "ChatPulse $VERSION" \
              --notes-file RELEASE_NOTES.md \
              --latest \
              "$ARCHIVE" \
              "$CHECKSUM"
          fi

          gh release view "$TAG" --json tagName,name,isDraft,isPrerelease,url

      - name: Сохранение релизных файлов в Actions
        if: steps.metadata.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ChatPulse-release-v${{ steps.metadata.outputs.version }}
          path: |
            dist/ChatPulse-macOS-v${{ steps.metadata.outputs.version }}.zip
            dist/ChatPulse-macOS-v${{ steps.metadata.outputs.version }}.zip.sha256
          if-no-files-found: error
          retention-days: 90
