name: CI

on:
  push:
    branches: [main, "agent/**", "feature/**", "fix/**"]
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    name: Полный цикл ${{ matrix.round }}/5
    runs-on: macos-15
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        round: [1, 2, 3, 4, 5]

    steps:
      - name: Получение исходников
        uses: actions/checkout@v4

      - name: Версия Swift
        run: swift --version

      - name: Модульные тесты — цикл ${{ matrix.round }}
        shell: bash
        run: |
          set -o pipefail
          if ! swift test > swift-test.log 2>&1; then
            echo "Последние строки компилятора Swift:"
            tail -n 160 swift-test.log
            exit 1
          fi
          tail -n 30 swift-test.log

      - name: Диагностический лог Swift — цикл ${{ matrix.round }}
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ChatPulse-swift-log-${{ matrix.round }}
          path: swift-test.log
          if-no-files-found: error
          retention-days: 7

      - name: 20 проверок качества — цикл ${{ matrix.round }}
        run: python3 scripts/quality_gate.py

      - name: Сборка приложения macOS — цикл ${{ matrix.round }}
        run: bash scripts/build_app.sh

      - name: Проверка bundle — цикл ${{ matrix.round }}
        run: |
          test -x dist/ChatPulse.app/Contents/MacOS/ChatPulse
          plutil -lint dist/ChatPulse.app/Contents/Info.plist
          codesign --verify --deep --strict dist/ChatPulse.app
          test "$(defaults read "$PWD/dist/ChatPulse.app/Contents/Info" CFBundleShortVersionString)" = "0.4.0"

      - name: Упаковка приложения
        if: matrix.round == 5
        run: ditto -c -k --sequesterRsrc --keepParent dist/ChatPulse.app dist/ChatPulse-macOS.zip

      - name: Публикация неподписанного приложения
        if: matrix.round == 5
        uses: actions/upload-artifact@v4
        with:
          name: ChatPulse-macOS
          path: dist/ChatPulse-macOS.zip
          if-no-files-found: error
