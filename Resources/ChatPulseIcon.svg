<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1630"/>
      <stop offset="1" stop-color="#211244"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3989ff"/>
      <stop offset="0.48" stop-color="#864cff"/>
      <stop offset="0.72" stop-color="#b044ff"/>
      <stop offset="1" stop-color="#20bddf"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="32" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="72" y="72" width="880" height="880" rx="220" fill="#000" opacity="0.42" filter="url(#shadow)"/>
  <rect x="72" y="72" width="880" height="880" rx="220" fill="url(#background)" stroke="#91a9e6" stroke-width="12"/>
  <path d="M180 550 H330 L405 265 L515 760 L610 420 L690 550 H845"
        fill="none" stroke="url(#wave)" stroke-width="42" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
</svg>
