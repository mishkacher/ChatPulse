name: CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run unit tests
        run: swift test

      - name: Run 20 quality gates
        run: python3 scripts/quality_gate.py

      - name: Build macOS app
        run: bash scripts/build_app.sh

      - name: Archive app
        run: ditto -c -k --sequesterRsrc --keepParent dist/ChatPulse.app dist/ChatPulse-macOS.zip

      - name: Upload unsigned app
        uses: actions/upload-artifact@v4
        with:
          name: ChatPulse-macOS
          path: dist/ChatPulse-macOS.zip
          if-no-files-found: error
