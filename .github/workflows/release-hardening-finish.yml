name: Release hardening finish

on:
  push:
    branches:
      - fix/release-hardening-0.5.2
    paths:
      - ".github/workflows/release-hardening-finish.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/release-hardening-0.5.2

      - name: Write tested release files
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import base64, gzip
          payload = {'tests/chrome-extension/service-worker.test.mjs': '', 'package.json': '', '.github/workflows/extension-ci.yml': '', 'scripts/validate_extension.mjs': '', 'README.md': '', 'CHANGELOG.md': '', 'chrome-extension/README.md': '', 'docs/stale-tab-recovery.md': ''}
          for path, encoded in payload.items():
              target=Path(path)
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_bytes(gzip.decompress(base64.b64decode(encoded)))
          PY
          npm run audit:extension
          rm .github/workflows/release-hardening-finish.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Добавить интеграционный аудит ChatPulse 0.5.2"
          git push origin HEAD:fix/release-hardening-0.5.2
